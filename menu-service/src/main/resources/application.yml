server:
  port: 8080

spring:
  application:
    name: cloudkitchen-menu-service
  datasource:
    url: jdbc:postgresql://localhost:5432/cloudkitchen
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  cors:
    allowed-origins: "*"

logging:
  level:
    com.cloudkitchen: INFO
  file:
    name: /var/log/cloudkitchen/menu.log
