name: ai-recommender

on:
  push:
    branches: [main]
    paths:
      - 'ai-recommender/**'
      - '.github/workflows/ai-recommender.yml'
  pull_request:
    paths:
      - 'ai-recommender/**'
      - '.github/workflows/ai-recommender.yml'

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: "256603361470.dkr.ecr.ap-south-1.amazonaws.com"
  ECR_REPO: cloudkitchen-ai-repo
  SERVICE_DIR: ai-recommender

jobs:
  build:
    name: build · ai-recommender
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python lint + test
        run: |
          cd ${{ env.SERVICE_DIR }}
          pip install -q ruff pytest -r requirements.txt || pip install -q ruff pytest
          ruff check . || true
          pytest -q || true

      - name: Semgrep SAST (→ Semgrep Cloud dashboard)
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: pip install -q semgrep && semgrep ci || true
        continue-on-error: true

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ env.SERVICE_DIR }}
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR login
        run: aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Build image
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPO:${{ github.sha }} \
            ${{ env.SERVICE_DIR }}

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker tag $ECR_REGISTRY/$ECR_REPO:${{ github.sha }} $ECR_REGISTRY/$ECR_REPO:latest
          elif [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            docker tag $ECR_REGISTRY/$ECR_REPO:${{ github.sha }} $ECR_REGISTRY/$ECR_REPO:dev-latest
          fi

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Push image to ECR
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        run: |
          docker push $ECR_REGISTRY/$ECR_REPO:${{ github.sha }}

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker push $ECR_REGISTRY/$ECR_REPO:latest
          elif [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            docker push $ECR_REGISTRY/$ECR_REPO:dev-latest
          fi

      - name: Update GitOps prod valueFile
        if: github.ref == 'refs/heads/main'
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          git clone https://cloudkitchen-ci:$GITOPS_TOKEN@github.com/${{ github.repository_owner }}/Cloudkitchen-GitOps.git gitops
          cd gitops
          git pull --rebase origin main
          sed -i 's|^  ai: *"[^"]*"|  ai: "${{ github.sha }}"|' helm/cloudkitchen/values-prod.yaml
          git config user.name  "cloudkitchen-ci"
          git config user.email "ci@cloudkitchen.local"
          git add helm/cloudkitchen/values-prod.yaml
          git commit -m "ci(ai-recommender): prod deploy ${{ github.sha }}" || echo "no changes"
          git push || { git pull --rebase && git push; }

      - name: Update GitOps dev valueFile
        if: github.ref == 'refs/heads/dev'
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          git clone https://cloudkitchen-ci:$GITOPS_TOKEN@github.com/${{ github.repository_owner }}/Cloudkitchen-GitOps.git gitops
          cd gitops
          git pull --rebase origin dev
          sed -i 's|^  ai: *"[^"]*"|  ai: "dev-latest"|' helm/cloudkitchen/values-dev.yaml
          git config user.name  "cloudkitchen-ci"
          git config user.email "ci@cloudkitchen.local"
          git add helm/cloudkitchen/values-dev.yaml
          git commit -m "ci(ai-recommender): dev deploy ${{ github.sha }}" || echo "no changes"
          git push || { git pull --rebase && git push; }
