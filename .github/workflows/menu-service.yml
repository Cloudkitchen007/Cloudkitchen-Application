name: menu-service

on:
  push:
    branches: [main]
    paths:
      - 'menu-service/**'
      - '.github/workflows/menu-service.yml'
  pull_request:
    paths:
      - 'menu-service/**'
      - '.github/workflows/menu-service.yml'

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: "256603361470.dkr.ecr.ap-south-1.amazonaws.com"
  ECR_REPO: cloudkitchen-menu-repo
  SERVICE_DIR: menu-service

jobs:
  build:
    name: build · menu-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Java test
        run: cd ${{ env.SERVICE_DIR }} && mvn -B test

      - name: Semgrep SAST (→ Semgrep Cloud dashboard)

        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: pip install -q semgrep && semgrep ci || true
        continue-on-error: true

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ env.SERVICE_DIR }}
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR login
        run: aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Build image
        run: |
          # Build with commit SHA for all branches (used for scans and traceability)
          docker build \
            -t $ECR_REGISTRY/$ECR_REPO:${{ github.sha }} \
            ${{ env.SERVICE_DIR }}

          # Additionally tag for the target environment (dev or prod)
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker tag $ECR_REGISTRY/$ECR_REPO:${{ github.sha }} $ECR_REGISTRY/$ECR_REPO:latest
          elif [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            docker tag $ECR_REGISTRY/$ECR_REPO:${{ github.sha }} $ECR_REGISTRY/$ECR_REPO:dev-latest
          fi

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Push image to ECR
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        run: |
          # Always push the commit SHA tag (immutable record)
          docker push $ECR_REGISTRY/$ECR_REPO:${{ github.sha }}

          # Push environment-specific tag (mutable, always points to latest of that env)
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker push $ECR_REGISTRY/$ECR_REPO:latest
          elif [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            docker push $ECR_REGISTRY/$ECR_REPO:dev-latest
          fi

      - name: Update GitOps prod valueFile
        if: github.ref == 'refs/heads/main'
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          git clone https://cloudkitchen-ci:$GITOPS_TOKEN@github.com/${{ github.repository_owner }}/Cloudkitchen-GitOps.git gitops
          cd gitops
          git pull --rebase origin main
          # Update values-prod.yaml (prod branch watches main)
          sed -i 's|^  menu: *"[^"]*"|  menu: "${{ github.sha }}"|' helm/cloudkitchen/values-prod.yaml
          git config user.name  "cloudkitchen-ci"
          git config user.email "ci@cloudkitchen.local"
          git add helm/cloudkitchen/values-prod.yaml
          git commit -m "ci(menu-service): prod deploy ${{ github.sha }}" || echo "no changes"
          git push || { git pull --rebase && git push; }

      - name: Update GitOps dev valueFile
        if: github.ref == 'refs/heads/dev'
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          git clone https://cloudkitchen-ci:$GITOPS_TOKEN@github.com/${{ github.repository_owner }}/Cloudkitchen-GitOps.git gitops
          cd gitops
          git pull --rebase origin dev
          # Update values-dev.yaml (dev branch watches dev)
          sed -i 's|^  menu: *"[^"]*"|  menu: "dev-latest"|' helm/cloudkitchen/values-dev.yaml
          git config user.name  "cloudkitchen-ci"
          git config user.email "ci@cloudkitchen.local"
          git add helm/cloudkitchen/values-dev.yaml
          git commit -m "ci(menu-service): dev deploy ${{ github.sha }}" || echo "no changes"
          git push || { git pull --rebase && git push; }
