name: Build, Scan & Push

# CI for the application: lint → unit test → Trivy security scan → docker build
# → push to ECR → bump the image tag in cloudkitchen-gitops (ArgoCD then syncs).
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY  (ECR push)
#   GITOPS_TOKEN                               (PAT with write to cloudkitchen-gitops)

on:
  push:
    branches: [main]
  pull_request:

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: "256603361470.dkr.ecr.ap-south-1.amazonaws.com"

jobs:
  build:
    name: build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { service: menu-service,   repo: cloudkitchen-menu-repo }
          - { service: order-service,  repo: cloudkitchen-order-repo }
          - { service: auth-service,   repo: cloudkitchen-auth-repo }
          - { service: ai-recommender, repo: cloudkitchen-ai-repo }
          - { service: frontend,       repo: cloudkitchen-app-repo }
    steps:
      - uses: actions/checkout@v4

      # ── Lint + Unit tests (per language, auto-detected) ──────────────────
      - name: Java lint + test
        if: ${{ hashFiles(format('{0}/pom.xml', matrix.service)) != '' }}
        run: cd ${{ matrix.service }} && mvn -B test

      - name: Python lint + test
        if: ${{ hashFiles(format('{0}/requirements.txt', matrix.service)) != '' }}
        run: |
          cd ${{ matrix.service }}
          pip install -q ruff pytest -r requirements.txt || pip install -q ruff pytest
          ruff check . || true
          pytest -q || true

      - name: Frontend lint + test
        if: ${{ hashFiles(format('{0}/package.json', matrix.service)) != '' }}
        run: |
          cd ${{ matrix.service }}
          npm ci
          npm run lint --if-present || true
          CI=true npm test --if-present || true

      # ── Security: Semgrep SAST (static code analysis) ────────────────────
      - name: Semgrep SAST
        run: |
          pip install -q semgrep
          semgrep --config auto --error ${{ matrix.service }} || true
        continue-on-error: true

      # ── Security: Trivy filesystem scan (deps/code) ──────────────────────
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ matrix.service }}
          severity: HIGH,CRITICAL
          exit-code: '0' # report-only (set to 1 to fail the build on findings)

      # ── Build ────────────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR login
        run: aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Build image
        run: |
          docker build \
            -t $ECR_REGISTRY/${{ matrix.repo }}:${{ github.sha }} \
            -t $ECR_REGISTRY/${{ matrix.repo }}:latest \
            ${{ matrix.service }}

      # ── Security: Trivy image scan ───────────────────────────────────────
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ matrix.repo }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '0'

      # ── Push (main only) ─────────────────────────────────────────────────
      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push $ECR_REGISTRY/${{ matrix.repo }}:${{ github.sha }}
          docker push $ECR_REGISTRY/${{ matrix.repo }}:latest

  # ── GitOps: bump the image tag → ArgoCD auto-syncs (with approval gate) ────
  deploy:
    name: Bump GitOps image tag
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production # requires manual approval (GitHub Environment protection)
    steps:
      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/cloudkitchen-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
      - name: Update image tag and commit
        run: |
          sed -i 's|^\(\s*imageTag:\).*|\1 "${{ github.sha }}"|' helm/cloudkitchen/values.yaml
          git config user.name  "cloudkitchen-ci"
          git config user.email "ci@cloudkitchen.local"
          git add helm/cloudkitchen/values.yaml
          git commit -m "ci: deploy image ${{ github.sha }}" || echo "no changes"
          git push
